

services:
  mongo:
    image: mongo:7
    container_name: reservas_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: reservas_backend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./backend/logs:/app/logs
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/reservasdb
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: reservas_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo_data:
