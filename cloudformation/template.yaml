AWSTemplateFormatVersion: '2010-09-09'
Description: Infraestructura para proyecto DevOps con EC2 y S3

Resources:
  DevOpsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "devops-reservas-${AWS::AccountId}-${AWS::Region}"

  DevOpsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group para proyecto DevOps
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0

  DevOpsEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t2.micro
      KeyName: Clave_1
      SecurityGroupIds:
        - !Ref DevOpsSecurityGroup
      Tags:
        - Key: Name
          Value: DevOpsProjectEC2

Outputs:
  InstanceId:
    Description: ID de la instancia EC2
    Value: !Ref DevOpsEC2Instance

  BucketName:
    Description: Nombre del bucket S3
    Value: !Ref DevOpsBucket

  SecurityGroupId:
    Description: ID del Security Group
    Value: !Ref DevOpsSecurityGroup
